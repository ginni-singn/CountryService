# -----------------------------------------------------------------------
# CountryService — application configuration
# -----------------------------------------------------------------------

spring.application.name=CountryService
server.port=8080

# Base URL for the upstream REST Countries API.
# Override in test profiles to point at a WireMock stub server.
rest.countries.base-url=https://restcountries.com/v3.1

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
# Reduce noise from Spring internals in production; increase to DEBUG
# while developing to see full HTTP request/response details.
logging.level.root=INFO
logging.level.com.countryservice=INFO
